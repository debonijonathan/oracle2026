name: Update Predictions

on:
schedule:
  - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn xgboost kaggle

      - name: Run prediction script
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: python generate.py

      - name: Commit updated predictions
        run: |
          git config user.name "oracle-bot"
          git config user.email "bot@oracle2026.com"
          git add predictions.json
          git diff --staged --quiet || git commit -m "Update predictions $(date +'%Y-%m-%d')"
          git push
