name: Update Predictions

on:
  schedule:
    - cron: '0 2 * * *'  # ogni notte alle 02:00 UTC
  workflow_dispatch:       # permette di lanciarlo manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn xgboost

      - name: Run prediction script
        run: python generate.py

      - name: Commit updated predictions
        run: |
          git config user.name "oracle-bot"
          git config user.email "bot@oracle2026.com"
          git add predictions.json
          git diff --staged --quiet || git commit -m "Update predictions $(date +'%Y-%m-%d')"
          git push
